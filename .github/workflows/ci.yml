name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel an older run on the same branch when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        # macOS exercises src/discovery/macos.rs + src/process/macos.rs.
        # Linux exercises src/discovery/linux.rs + src/process/linux.rs —
        # the platform paths are mutually exclusive via cfg gates, so both
        # runners are required to actually verify all of the code.
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: cargo build
        run: cargo build --locked --all-targets

      - name: cargo test
        run: cargo test --locked --all-targets
