<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Portbook</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <h1>Portbook</h1>
    <span id="status" class="dot" title="connecting"></span>
    <nav class="tabs">
      <button class="tab active" data-tab="live">Live</button>
      <button class="tab" data-tab="all">All</button>
    </nav>
    <span id="count"></span>
    <nav class="links">
      <span id="version" class="version" title="portbook version"></span>
      <a href="https://github.com/a-grasso/portbook" target="_blank" rel="noopener" title="GitHub">GitHub</a>
      <a href="https://www.linkedin.com/in/a-grasso/" target="_blank" rel="noopener" title="LinkedIn">LinkedIn</a>
    </nav>
  </header>
  <main id="grid"></main>
  <template id="card-tpl">
    <a class="card" target="_blank" rel="noopener">
      <div class="card-head">
        <span class="port"></span>
        <span class="kind-badge"></span>
        <span class="project"></span>
      </div>
      <div class="title"></div>
      <div class="desc"></div>
      <div class="cmd"></div>
    </a>
  </template>
  <script src="/app.js" type="module"></script>
</body>
</html>
