# git-cliff configuration — see https://git-cliff.org/docs/configuration
#
# Generates CHANGELOG.md and release notes from Conventional Commits.
# Run `git cliff --tag vX.Y.Z -o CHANGELOG.md` before tagging a release;
# cargo-dist picks up the matching version section as the GitHub Release body.

[changelog]
header = """
# Changelog

All notable changes to portbook are documented here.
The format follows [Keep a Changelog](https://keepachangelog.com/) and this
project adheres to [Semantic Versioning](https://semver.org/).

"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits %}
        - {{ commit.message | upper_first | trim }}\
            {% if commit.breaking %} **[breaking]**{% endif %}\
    {% endfor %}
{% endfor %}\n
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9].*"
topo_order = false
sort_commits = "oldest"

# Map Conventional Commit types → changelog sections.
# Order here is the display order in the rendered changelog.
commit_parsers = [
  { message = "^feat",     group = "Features" },
  { message = "^fix",      group = "Bug Fixes" },
  { message = "^perf",     group = "Performance" },
  { message = "^refactor", group = "Refactor" },
  { message = "^docs",     group = "Documentation" },
  { message = "^test",     group = "Tests" },
  { message = "^build",    group = "Build" },
  { message = "^ci",       group = "CI" },
  { message = "^chore",    group = "Chores" },
  { message = "^revert",   group = "Reverts" },
  { message = ".*",        skip = true },
]
